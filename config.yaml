# Lectra AI Configuration

audio:
  sample_rate: 16000  # 16kHz for optimal processing
  chunk_duration: 30  # seconds per chunk for processing
  
vad:
  min_segment_ms: 80  # ENHANCEMENT 3: drop segments shorter than this
  # Pre-VAD trim settings
  aggressiveness: 3  # 0-3, higher = more aggressive filtering
  frame_duration_ms: 30  # 10, 20, or 30 ms
  padding_duration_ms: 300  # padding around speech segments
  min_speech_duration_ms: 250  # minimum speech segment length
  
high_pass_filter:
  enabled: true       # ENHANCEMENT 1
  cutoff_hz: 120      # ENHANCEMENT 1
  
deepfilternet:
  model: "DeepFilterNet3"  # DeepFilterNet2 or DeepFilterNet3
  post_filter: false  # OFF: post-filter sharpens the mask and gates out quiet consonants/syllables
  atten_lim_db: 30  # strong noise removal in the wet path; syllables are restored via the band-limited dry mix below
  dry_wet_mix: 0.0   # OFF — MetricGAN+ now restores/cleans; dry mix no longer needed (it re-added noise)
  dry_mix_hpf_hz: 800

# Neural enhancer: MetricGAN+ runs AFTER DeepFilterNet as a final neural polish.
# This is the "separator"-style denoiser — light, faster-than-realtime on CPU,
# bounded spectral mask (no artifacts). Chain: DeepFilterNet -> MetricGAN+.
# Gets ~40 dB speech-to-noise (perceptually clean) with words intact.
neural_enhancer:
  enabled: true     # set false to fall back to DeepFilterNet-only
  model: "metricgan-plus-voicebank"

low_band_denoise:
  enabled: false    # OFF — MetricGAN+ handles the rumble now
  cutoff_hz: 700
  strength: 0.85

# Voice Beautify: post-cleaning master applied to the SPEECH SEGMENTS ONLY, after
# all noise removal. Makes the clean voice sound smooth/natural instead of
# "broken-speaker". SNR-guarded — if any stage would add noise it auto-disables.
# Does NOT touch noise removal or diarization.
beautify:
  enabled: false                 # OFF — output is the raw 16kHz DFN->MetricGAN+ cleaned voice
  target_loudness_dbfs: -19      # consistent broadcast-ish loudness
  max_snr_drop_db: 6             # safety: abort a stage if speech-to-noise drops more than this
  tone:
    enabled: true                # gentle corrective EQ (tame boom, add clarity, de-harsh)
  leveler:
    enabled: true                # downward compression only — evens loud jumps, never boosts noise
    strength: 0.7
    gate_dbfs: -50               # never process below this (protects the residual floor)
    # Air = a NATURAL high-band extension. It scales to the input's own HF (an
    # anchor), so band-limited inputs (e.g. WhatsApp/Opus) get almost none and
    # can't grow a harsh shelf. amount_db = how far BELOW that anchor the air sits.
  air:
    enabled: true                # synthesize subtle >8kHz "air"; output at higher sample rate
    output_sr: 24000
    amount_db: -9                # dB below the existing HF anchor (more negative = subtler)

diarization:
  enabled: true
  min_speakers: 1
  max_speakers: 10
  
asr:
  skip: true  # disabled for now
  model: "turbo"  # tiny, base, small, medium, large, large-v3, turbo (recommended)
  language: null  # auto-detect if null
  compute_type: "int8"  # int8 (fastest on CPU), float16, or float32
  device: "cpu"  # cpu or cuda (auto-detect if not set)
  
cache:
  enabled: false  # DISABLED for testing new voice isolation architecture

# ============================================================================
# Custom DSP Modules (Experimental - disabled by default)
# ============================================================================

profiler:
  enabled: false  # Enable audio quality profiling before processing
  wavelet: 'db8'  # Wavelet type for noise estimation (db4, db8, sym4, etc.)

adaptive_router:
  enabled: false  # Enable intelligent processing method selection
  fallback_to_deepfilter: true  # Always use DeepFilterNet if router fails

spectral_restoration:
  enabled: false  # Enable post-processing spectral restoration
  strength: 'auto'  # Restoration strength: 'auto', 'light', 'medium', 'heavy'

quality_metrics:
  enabled: false  # Enable quality metrics computation
  compute_composite_score: true  # Compute overall quality score (0-100)

# ============================================================================
  
output:
  format: "wav"  # wav, mp3, flac
  bit_depth: 16  # 16 or 24 for wav
  preserve_video: true  # if input is video, merge cleaned audio back
